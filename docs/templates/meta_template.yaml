# meta.yaml — template for a new neighbourhood
#
# Lives at: district-tool-data/<city>/<neighbourhood>/meta.yaml
# Updated whenever a dataset is promoted from cleaned/ to reviewed/.
#
# Top-level keys are dataset names matching the DataLoader's method names
# (buildings, roads, trees, terrain_dsm, terrain_dtm, etc.).

